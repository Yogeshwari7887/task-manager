# Application Configuration
spring.application.name=task-manager

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=dGFza21hbmFnZXJzZWNyZXRrZXlmb3Jqd3RhdXRoZW50aWNhdGlvbjIwMjQ=
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Server
server.port=8080
server.servlet.context-path=/api

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@taskmanager.com

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
